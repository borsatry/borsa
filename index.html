<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BorsaTR | Canlı Döviz, Altın ve Hava Durumu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { border: none; border-radius: 15px; transition: transform 0.3s; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .finance-val { font-size: 1.5rem; font-weight: bold; color: #2c3e50; }
        .header-bg { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); color: white; padding: 40px 0; margin-bottom: 30px; }
    </style>
</head>
<body>

<div class="header-bg text-center">
    <h1>BorsaTR</h1>
    <p>İstanbul Canlı Finans ve Hava Durumu Paneli</p>
</div>

<div class="container">
    <div class="row g-4">
        <div class="col-md-4">
            <div class="card p-4 text-center">
                <i class="fas fa-dollar-sign fa-2x mb-3 text-primary"></i>
                <h5>USD / TRY</h5>
                <div id="usd-try" class="finance-val">Yükleniyor...</div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-4 text-center">
                <i class="fas fa-coins fa-2x mb-3 text-warning"></i>
                <h5>Gram Altın</h5>
                <div id="gold-price" class="finance-val">Yükleniyor...</div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-4 text-center">
                <i class="fab fa-bitcoin fa-2x mb-3 text-info"></i>
                <h5>Bitcoin (BTC)</h5>
                <div id="btc-price" class="finance-val">Yükleniyor...</div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card p-4">
                <h5><i class="fas fa-cloud-sun me-2"></i> İstanbul Hava Durumu</h5>
                <hr>
                <div class="d-flex justify-content-between align-items-center">
                    <span id="weather-desc" class="text-capitalize">Hava Durumu alınıyor...</span>
                    <span id="temp" class="fs-2 fw-bold">--°C</span>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card p-4">
                <h5><i class="fas fa-calculator me-2"></i> Kredi Hesaplama</h5>
                <hr>
                <input type="number" id="amount" class="form-control mb-2" placeholder="Tutar (TL)">
                <button onclick="calculate()" class="btn btn-primary w-100">Hesapla</button>
                <div id="calc-result" class="mt-2 fw-bold text-success"></div>
            </div>
        </div>
    </div>
</div>

<script>
    async function updateData() {
        try {
            // Курс USD/TRY и Золото (через свободное API)
            const res = await fetch('https://open.er-api.com/v6/latest/USD');
            const data = await res.json();
            const tryRate = data.rates.TRY;
            
            document.getElementById('usd-try').innerText = tryRate.toFixed(2) + " TL";
            
            // Примерный расчет золота (Мировая цена за унцию / 31.1 * курс лиры)
            // Для точности в будущем лучше использовать турецкие API (CollectAPI)
            const goldGram = (2150 / 31.1035) * tryRate; 
            document.getElementById('gold-price').innerText = goldGram.toFixed(2) + " TL";

            // Биткоин
            const btcRes = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd');
            const btcData = await btcRes.json();
            document.getElementById('btc-price').innerText = "$" + btcData.bitcoin.usd.toLocaleString();

            // Погода (Стамбул) - Используем свободное API без ключа для теста
            const weatherRes = await fetch('https://api.open-meteo.com/v1/forecast?latitude=41.0082&longitude=28.9784&current_weather=true');
            const weatherData = await weatherRes.json();
            document.getElementById('temp').innerText = Math.round(weatherData.current_weather.temperature) + "°C";
            document.getElementById('weather-desc').innerText = "İstanbul";

        } catch (e) {
            console.log("Hata:", e);
        }
    }

    function calculate() {
        const amt = document.getElementById('amount').value;
        if(amt) {
            const total = amt * 1.25; // Условно +25% (просто для примера)
            document.getElementById('calc-result').innerText = "Geri Ödeme: " + total.toLocaleString() + " TL";
        }
    }

    updateData();
</script>

</body>
</html>
