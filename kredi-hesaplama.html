<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kredi Hesaplama 2026 | BorsaTR</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
        .calc-card { border-radius: 20px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.1); background: white; margin-top: 50px; }
        .result-box { background: #f0f7ff; border-radius: 10px; padding: 20px; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">BorsaTR</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="index.html">Ana Sayfa</a>
            <a class="nav-link" href="blog.html">Blog</a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card calc-card p-4 border-top border-primary border-5">
                <h2 class="fw-bold text-center mb-4 text-primary">Kredi Hesaplama</h2>
                
                <div class="mb-3">
                    <label class="form-label fw-bold">Kredi Tutarı (TL)</label>
                    <input type="number" class="form-control form-control-lg" id="amount" value="50000">
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Vade (Ay)</label>
                    <input type="number" class="form-control form-control-lg" id="term" value="12">
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">Aylık Faiz Oranı (%)</label>
                    <input type="number" class="form-control form-control-lg" id="rate" value="3.99" step="0.01">
                </div>

                <div class="result-box text-center">
                    <h5 class="text-muted">Aylık Taksit:</h5>
                    <h2 class="fw-bold text-primary" id="monthlyResult">0.00 TL</h2>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function calc() {
        const p = document.getElementById('amount').value;
        const n = document.getElementById('term').value;
        const i = document.getElementById('rate').value / 100;
        
        if(p && n && i) {
            const monthly = (p * i * Math.pow(1 + i, n)) / (Math.pow(1 + i, n) - 1);
            document.getElementById('monthlyResult').innerText = monthly.toLocaleString('tr-TR', {maximumFractionDigits:2}) + " TL";
        }
    }
    document.querySelectorAll('input').forEach(input => input.addEventListener('input', calc));
    calc();
</script>
</body>
</html>
